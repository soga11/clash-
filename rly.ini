ruleset=全球直连,[]GEOIP,CN


; === 第 7 优先级：兜底（关键修复：FINAL 不再默认DIRECT）===
ruleset=漏网之鱼,[]FINAL


;================= 策略组部分（你原样不动） =================

; 主策略组
custom_proxy_group=节点选择`select`[]AWS香港负载`[]AWS台湾负载`[]wawo香港`[]新加坡负载`[]香港负载`[]美国负载`[]AWS东京负载`[]自动选择`[]故障转移`[]DIRECT`.*

; 专用策略组
custom_proxy_group=油管视频`select`[]wawo香港`[]美国负载`[]AWS东京负载`[]AWS香港负载`[]AWS台湾负载`[]节点选择`[]自动选择`[]故障转移`[]DIRECT`.*
custom_proxy_group=香港流媒体`select`[]香港负载`[]wawo香港`[]AWS香港负载`[]节点选择`[]故障转移`.*
custom_proxy_group=ChatGPT`select`[]新加坡负载`[]美国负载`[]AWS东京负载`[]AWS台湾负载`[]节点选择`[]自动选择`[]故障转移`[]DIRECT`.*
custom_proxy_group=TikTok`select`[]AWS东京负载`[]新加坡负载`[]美国负载`[]AWS台湾负载`[]节点选择`[]自动选择`[]故障转移`.*
custom_proxy_group=奈飞视频`select`[]美国负载`[]AWS东京负载`[]新加坡负载`[]节点选择`[]自动选择`[]故障转移`.*
custom_proxy_group=电报消息`select`[]新加坡负载`[]节点选择`[]自动选择`[]故障转移`.*

; 自动测速/故障转移
custom_proxy_group=自动选择`url-test`.*`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=故障转移`fallback`.*`https://www.cloudflare.com/cdn-cgi/trace`600,,50

; 负载均衡组
custom_proxy_group=美国负载`load-balance`(洛杉矶|aws洛|美国|US|USA|America|United)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=新加坡负载`load-balance`(新加坡|SG|Singapore|狮城)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=香港负载`load-balance`(香港电视|电视|TVB|mytv)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=AWS香港负载`load-balance`(aws香港hy2)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=AWS台湾负载`load-balance`(aws台湾hy2)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=AWS东京负载`load-balance`(aws东京|东京|Tokyo|JP|日本)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=wawo香港`load-balance`(wawo香港)`https://www.cloudflare.com/cdn-cgi/trace`600,,50

; 其他组
custom_proxy_group=苹果服务`select`[]DIRECT`[]节点选择`[]自动选择
custom_proxy_group=广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=全球直连`select`[]DIRECT`[]节点选择

; ★ 关键修复：漏网之鱼默认“节点选择”，把DIRECT放后面
custom_proxy_group=漏网之鱼`select`[]节点选择`[]DIRECT`[]AWS香港负载`[]AWS台湾负载`[]wawo香港`[]新加坡负载`[]香港负载`[]美国负载`[]自动选择`[]故障转移`.*

;================= 规则生成器设置 =================
enable_rule_generator=true
overwrite_original_rules=true

