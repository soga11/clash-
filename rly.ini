# ================== Clash 配置完整修复版 ==================
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
ipv6: true
external-controller: 127.0.0.1:9090

# ================== Rule Providers ==================
rule-providers:
  # 广告拦截（替换原来的 adrules_1）
  adrules:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Cats-Team/AdRules@main/adrules_domainset.txt"
    path: ./rules/adrules.txt
    interval: 86400

  # blackmatrix7 广告规则（补充）
  blackmatrix-adrules:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/AdRules/AdRules.yaml"
    path: ./rules/blackmatrix-adrules.yaml
    interval: 86400

  # 其他常用规则（按需保留）
  apple:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Apple.list"
    path: ./rules/apple.txt
    interval: 86400

  china:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml"
    path: ./rules/china.yaml
    interval: 86400

  google:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Google/Google.yaml"
    path: ./rules/google.yaml
    interval: 86400

# ================== 规则部分（精简 + IPv6 支持）=================
rules:
  # 第 0 优先级：本地网络直连
  - RULE-SET,LocalAreaNetwork,全球直连

  # 第 1 优先级：DNS 分流
  - DOMAIN-SUFFIX,dns.pub,全球直连
  - DOMAIN-SUFFIX,doh.pub,全球直连
  - DOMAIN-SUFFIX,alidns.com,全球直连
  - IP-CIDR,114.114.114.114/32,全球直连,no-resolve
  - IP-CIDR,223.5.5.5/32,全球直连,no-resolve
  - IP-CIDR,119.29.29.29/32,全球直连,no-resolve
  - IP-CIDR,180.76.76.76/32,全球直连,no-resolve

  - DOMAIN-SUFFIX,cloudflare-dns.com,节点选择
  - DOMAIN-SUFFIX,dns.google,节点选择
  - DOMAIN-SUFFIX,quad9.net,节点选择
  - IP-CIDR,1.1.1.1/32,节点选择,no-resolve
  - IP-CIDR,1.0.0.1/32,节点选择,no-resolve
  - IP-CIDR,8.8.8.8/32,节点选择,no-resolve
  - IP-CIDR,8.8.4.4/32,节点选择,no-resolve
  - IP-CIDR6,2606:4700:4700::1111/128,节点选择,no-resolve
  - IP-CIDR6,2606:4700:4700::1001/128,节点选择,no-resolve
  - IP-CIDR6,2001:4860:4860::8888/128,节点选择,no-resolve
  - IP-CIDR6,2001:4860:4860::8844/128,节点选择,no-resolve

  # 第 2 优先级：测速域名
  - DOMAIN-SUFFIX,speedtest.net,节点选择
  - DOMAIN,fast.com,节点选择
  - DOMAIN-KEYWORD,speedtest,节点选择

  # 第 3 优先级：广告拦截（已修复）
  - RULE-SET,adrules,广告拦截
  - RULE-SET,blackmatrix-adrules,广告拦截
  - GEOSITE,category-ads-all,广告拦截

  # 第 4 优先级：应用规则
  - RULE-SET,ChatGPT,ChatGPT
  - RULE-SET,TikTok,TikTok
  - RULE-SET,YouTube,油管视频
  - RULE-SET,Netflix,奈飞视频
  - RULE-SET,myTVSUPER,香港流媒体
  - RULE-SET,Telegram,电报消息
  - RULE-SET,google,节点选择
  - RULE-SET,apple,苹果服务

  # 第 5 优先级：中国大陆直连
  - RULE-SET,china,全球直连

  # 第 6 优先级：兜底
  - MATCH,漏网之鱼

# ================== 策略组部分（保持你的原配置）=================
proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 香港负载
      - 自动选择
      - 故障转移
      - AWS香港负载
      - AWS台湾负载
      - wawo
      - 新加坡负载
      - 美国负载
      - AWS东京负载
      - DIRECT

  # 你的其他自定义组（保持不变）
  - name: 油管视频
    type: select
    proxies:
      - wawo
      - 美国负载
      - AWS东京负载
      - AWS香港负载
      - AWS台湾负载
      - 节点选择
      - 新加坡负载
      - 故障转移
      - DIRECT

  # ...（其他组如香港流媒体、ChatGPT、TikTok、奈飞视频、电报消息等保持你原来的配置）

  - name: 自动选择
    type: url-test
    url: "https://www.cloudflare.com/cdn-cgi/trace"
    interval: 600
    tolerance: 50

  - name: 故障转移
    type: fallback
    url: "https://www.cloudflare.com/cdn-cgi/trace"
    interval: 600
    tolerance: 50

  # 负载均衡组（保持你的配置）
  - name: 香港负载
    type: load-balance
    strategy: consistent-hashing
    url: "https://www.cloudflare.com/cdn-cgi/trace"
    interval: 600
    tolerance: 50

  # ... 其他负载组类似

  - name: 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 全球直连
    type: select
    proxies:
      - DIRECT
      - 节点选择

  - name: 漏网之鱼
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - DIRECT
      - 故障转移
      - AWS香港负载
      - AWS台湾负载
      - wawo
      - 新加坡负载
      - 香港负载
      - 美国负载

# ================== 规则生成器设置 ==================
enable_rule_generator: true
overwrite_original_rules: true
