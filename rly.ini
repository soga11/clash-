;===============================================================
; ACL4SSR + B7 - 旁路由稳定终版（IPv6 精简版）
; 优化说明：
; ✓ 移除重复规则：私有IP/国内域名交由外部列表统一管理
; ✓ 保留核心规则：公共DNS/测速/应用分流/兜底逻辑
; ✓ 策略组部分：100% 保留您原有的配置（未做任何修改）
;===============================================================

;================= 规则部分（精简 + IPv6 支持）=================

; === 第 0 优先级：公共基础设施走代理（核心规则）===
; ── 公共 DNS（域名+双栈IP，no-resolve 防递归）──
ruleset=节点选择,[]DOMAIN-KEYWORD,dns.pub
ruleset=节点选择,[]IP-CIDR,1.1.1.1/32,no-resolve
ruleset=节点选择,[]IP-CIDR,8.8.8.8/32,no-resolve
ruleset=节点选择,[]IP-CIDR6,2606:4700:4700::1111/128,no-resolve
ruleset=节点选择,[]IP-CIDR6,2001:4860:4860::8888/128,no-resolve

; ── 测速域名（确保测速结果准确）──
ruleset=节点选择,[]DOMAIN-SUFFIX,speedtest.net
ruleset=节点选择,[]DOMAIN,fast.com
ruleset=节点选择,[]DOMAIN-KEYWORD,speedtest

; === 第 1 优先级：基础直连（去重精简版）===
; ── 国内 DNS 直连（避免递归查询走代理）──
ruleset=全球直连,[]IP-CIDR,114.114.114.114/32,no-resolve
ruleset=全球直连,[]IP-CIDR,223.5.5.5/32,no-resolve

; ── 本地网络（含私有 IPv4/IPv6，无需手动写）──
; LocalAreaNetwork.list 已包含：192.168/10.0/172.16 + fc00::/fe80:: 等
ruleset=全球直连,https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list

; === 第 2 优先级：广告拦截（合并规则）===
ruleset=广告拦截,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/AdRules/AdRules.yaml

; === 第 3 优先级：应用规则（精细分流，保留核心）===
; ── ChatGPT / AI ──
ruleset=ChatGPT,[]DOMAIN-SUFFIX,openai.com
ruleset=ChatGPT,[]DOMAIN-SUFFIX,claude.ai
ruleset=ChatGPT,[]DOMAIN,gemini.google.com
ruleset=ChatGPT,[]DOMAIN-KEYWORD,openai
ruleset=ChatGPT,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml

; ── TikTok ──
ruleset=TikTok,[]DOMAIN-SUFFIX,tiktok.com
ruleset=TikTok,[]DOMAIN-KEYWORD,tiktok
ruleset=TikTok,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/TikTok/TikTok.yaml

; ── YouTube ──
ruleset=油管视频,[]DOMAIN-SUFFIX,youtube.com
ruleset=油管视频,[]DOMAIN-KEYWORD,youtube
ruleset=油管视频,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/YouTube/YouTube.yaml

; ── Netflix ──
ruleset=奈飞视频,[]DOMAIN-KEYWORD,netflix
ruleset=奈飞视频,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Netflix/Netflix.yaml

; ── 香港流媒体 ──
ruleset=香港流媒体,[]DOMAIN-KEYWORD,tvb
ruleset=香港流媒体,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/myTVSUPER/myTVSUPER.yaml

; ── Telegram（IPv4+IPv6 精简版）──
ruleset=电报消息,[]IP-CIDR,91.108.0.0/16,no-resolve
ruleset=电报消息,[]IP-CIDR,149.154.0.0/16,no-resolve
ruleset=电报消息,[]IP-CIDR6,2001:67c:4e8::/48,no-resolve
ruleset=电报消息,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Telegram/Telegram.yaml

; ── 苹果服务 ──
ruleset=苹果服务,https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Apple.list

; === 第 4 优先级：中国大陆直连（交给 ChinaMax 统一管理）===
; ChinaMax_Classical.yaml 已覆盖：
; ✓ 国内域名（含 quark/aliyun/baidu 等）
; ✓ GEOIP,CN
; ✓ 常见 CDN/云服务
; 无需再手动写重复规则！
ruleset=全球直连,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml

; === 第 5 优先级：兜底规则 ===
ruleset=广告拦截,[]GEOSITE,category-ads-all
ruleset=漏网之鱼,[]FINAL


;================= 策略组部分（100% 保留您的原版）=================

; 主策略组（默认自动选择）
custom_proxy_group=节点选择`select`[]香港负载`[]自动选择`[]故障转移`[]AWS香港负载`[]AWS台湾负载`[]wawo`[]新加坡负载`[]美国负载`[]AWS东京负载`[]DIRECT`.*

; 专用策略组
custom_proxy_group=油管视频`select`[]wawo`[]美国负载`[]AWS东京负载`[]AWS香港负载`[]AWS台湾负载`[]节点选择`[]新加坡负载`[]故障转移`[]DIRECT`.*
custom_proxy_group=香港流媒体`select`[]香港负载`[]wawo`[]AWS香港负载`[]节点选择`[]故障转移`.*
custom_proxy_group=ChatGPT`select`[]香港负载`[]美国负载`[]AWS东京负载`[]AWS台湾负载`[]新加坡负载`[]节点选择`[]自动选择`[]故障转移`[]DIRECT`.*
custom_proxy_group=TikTok`select`[]星辰负载`[]新加坡负载`[]美国负载`[]AWS台湾负载`[]节点选择`[]AWS东京负载`[]故障转移`.*
custom_proxy_group=奈飞视频`select`[]星辰负载`[]AWS东京负载`[]新加坡负载`[]节点选择`[]美国负载`[]故障转移`.*
custom_proxy_group=电报消息`select`[]新加坡负载`[]香港负载`[]wawo`[]AWS香港负载`[]节点选择`[]自动选择`[]故障转移`.*

; 自动测速 / 故障转移
custom_proxy_group=自动选择`url-test`.*`https://www.cloudflare.com/cdn-cgi/trace`600,5,50
custom_proxy_group=故障转移`fallback`.*`https://www.cloudflare.com/cdn-cgi/trace`600,5,50

; 负载均衡组
custom_proxy_group=香港负载`load-balance`(香港电视)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=星辰负载`load-balance`(星辰)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=wawo`load-balance`(wawo)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=新加坡负载`load-balance`(新加坡)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=AWS香港负载`load-balance`(aws香港hy2)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=AWS台湾负载`load-balance`(台湾)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=AWS东京负载`load-balance`(东京)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=美国负载`load-balance`(洛杉矶)`https://www.cloudflare.com/cdn-cgi/trace`600,,50

; 其他组
custom_proxy_group=苹果服务`select`[]DIRECT`[]节点选择`[]自动选择
custom_proxy_group=广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=全球直连`select`[]DIRECT`[]节点选择

; 漏网之鱼（方案一：默认走节点选择）
custom_proxy_group=漏网之鱼`select`[]节点选择`[]自动选择`[]DIRECT`[]故障转移`[]AWS香港负载`[]AWS台湾负载`[]wawo`[]新加坡负载`[]香港负载`[]美国负载`.*


;================= 规则生成器设置 =================
enable_rule_generator=true
overwrite_original_rules=true
