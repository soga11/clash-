;===============================================================
; ACL4SSR + B7(Blackmatrix7) - 旁路由稳定终版（FINAL默认走代理版）
; 目标：
; 1) FINAL 默认走代理侧（不再漏回 DIRECT）
; 2) 公共 DNS / DoH / IPv6 DNS 全部前置代理
; 3) Speedtest/Fast/Cloudflare 测速链路更稳
; 4) Telegram 完整 IPv6
; 5) BM7 YAML 显式 clash-classic，兼容标准 subconverter
; 6) 节点选择默认改自动选择
;===============================================================

;================= 规则部分 =================
