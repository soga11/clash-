;================= 规则部分（精简 + IPv6 支持）=================
; === 第 0 优先级：本地网络直连 ===
; LocalAreaNetwork.list 已包含：
; 192.168/10.0/172.16 + fc00::/fe80:: 等
ruleset=全球直连,https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list
; === 第 1 优先级：DNS 分流 ===
; ── 国内 DNS 直连 ──
ruleset=全球直连,[]DOMAIN-SUFFIX,dns.pub
ruleset=全球直连,[]DOMAIN-SUFFIX,doh.pub
ruleset=全球直连,[]DOMAIN-SUFFIX,alidns.com
ruleset=全球直连,[]IP-CIDR,114.114.114.114/32,no-resolve
ruleset=全球直连,[]IP-CIDR,223.5.5.5/32,no-resolve
ruleset=全球直连,[]IP-CIDR,119.29.29.29/32,no-resolve
ruleset=全球直连,[]IP-CIDR,180.76.76.76/32,no-resolve
; ── 海外 DNS 走代理 ──
ruleset=节点选择,[]DOMAIN-SUFFIX,cloudflare-dns.com
ruleset=节点选择,[]DOMAIN-SUFFIX,dns.google
ruleset=节点选择,[]DOMAIN-SUFFIX,quad9.net
ruleset=节点选择,[]IP-CIDR,1.1.1.1/32,no-resolve
ruleset=节点选择,[]IP-CIDR,1.0.0.1/32,no-resolve
ruleset=节点选择,[]IP-CIDR,8.8.8.8/32,no-resolve
ruleset=节点选择,[]IP-CIDR,8.8.4.4/32,no-resolve
ruleset=节点选择,[]IP-CIDR6,2606:4700:4700::1111/128,no-resolve
ruleset=节点选择,[]IP-CIDR6,2606:4700:4700::1001/128,no-resolve
ruleset=节点选择,[]IP-CIDR6,2001:4860:4860::8888/128,no-resolve
ruleset=节点选择,[]IP-CIDR6,2001:4860:4860::8844/128,no-resolve
; === 第 2 优先级：测速域名走代理 ===
; 确保测速结果走节点，避免测速被直连影响
ruleset=节点选择,[]DOMAIN-SUFFIX,speedtest.net
ruleset=节点选择,[]DOMAIN,fast.com
ruleset=节点选择,[]DOMAIN-KEYWORD,speedtest
; === 第 3 优先级：广告拦截 ===
; 按你的要求：广告规则保留
ruleset=广告拦截,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/AdRules/AdRules.yaml
ruleset=广告拦截,[]GEOSITE,category-ads-all
; === 第 4 优先级：应用规则 ===
; ── ChatGPT / AI ──
ruleset=ChatGPT,[]DOMAIN-SUFFIX,openai.com
ruleset=ChatGPT,[]DOMAIN-SUFFIX,chatgpt.com
ruleset=ChatGPT,[]DOMAIN-SUFFIX,oaistatic.com
ruleset=ChatGPT,[]DOMAIN-SUFFIX,oaiusercontent.com
ruleset=ChatGPT,[]DOMAIN-SUFFIX,openaiapi-site.azureedge.net
ruleset=ChatGPT,[]DOMAIN-KEYWORD,openai
; Claude
ruleset=ChatGPT,[]DOMAIN-SUFFIX,claude.ai
ruleset=ChatGPT,[]DOMAIN-SUFFIX,anthropic.com
; Gemini / Google AI
ruleset=ChatGPT,[]DOMAIN,gemini.google.com
ruleset=ChatGPT,[]DOMAIN-SUFFIX,generativelanguage.googleapis.com
ruleset=ChatGPT,[]DOMAIN-SUFFIX,ai.google.dev
ruleset=ChatGPT,[]DOMAIN-SUFFIX,aistudio.google.com
; Perplexity
ruleset=ChatGPT,[]DOMAIN-SUFFIX,perplexity.ai
; Copilot / Bing AI
ruleset=ChatGPT,[]DOMAIN-SUFFIX,copilot.microsoft.com
ruleset=ChatGPT,[]DOMAIN-SUFFIX,bing.com
; OpenAI 外部规则
ruleset=ChatGPT,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml
; ── TikTok ──
ruleset=TikTok,[]DOMAIN-SUFFIX,tiktok.com
ruleset=TikTok,[]DOMAIN-SUFFIX,tiktokv.com
ruleset=TikTok,[]DOMAIN-SUFFIX,tiktokcdn.com
ruleset=TikTok,[]DOMAIN-KEYWORD,tiktok
ruleset=TikTok,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/TikTok/TikTok.yaml
; ── YouTube ──
ruleset=油管视频,[]DOMAIN-SUFFIX,youtube.com
ruleset=油管视频,[]DOMAIN-SUFFIX,youtu.be
ruleset=油管视频,[]DOMAIN-SUFFIX,googlevideo.com
ruleset=油管视频,[]DOMAIN-SUFFIX,ytimg.com
ruleset=油管视频,[]DOMAIN-KEYWORD,youtube
ruleset=油管视频,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/YouTube/YouTube.yaml
; ── Netflix ──
ruleset=奈飞视频,[]DOMAIN-SUFFIX,netflix.com
ruleset=奈飞视频,[]DOMAIN-SUFFIX,netflix.net
ruleset=奈飞视频,[]DOMAIN-SUFFIX,nflxvideo.net
ruleset=奈飞视频,[]DOMAIN-SUFFIX,nflximg.net
ruleset=奈飞视频,[]DOMAIN-SUFFIX,nflxso.net
ruleset=奈飞视频,[]DOMAIN-KEYWORD,netflix
ruleset=奈飞视频,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Netflix/Netflix.yaml
; ── 香港流媒体 ──
ruleset=香港流媒体,[]DOMAIN-KEYWORD,tvb
ruleset=香港流媒体,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/myTVSUPER/myTVSUPER.yaml
; ── Telegram IPv4 + IPv6 ──
ruleset=电报消息,[]IP-CIDR,91.108.0.0/16,no-resolve
ruleset=电报消息,[]IP-CIDR,149.154.0.0/16,no-resolve
ruleset=电报消息,[]IP-CIDR6,2001:67c:4e8::/48,no-resolve
ruleset=电报消息,[]IP-CIDR6,2001:b28:f23d::/48,no-resolve
ruleset=电报消息,[]IP-CIDR6,2001:b28:f23f::/48,no-resolve
ruleset=电报消息,clash-classic:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Telegram/Telegram.yaml
; ── Google 服务 ──
ruleset=节点选择,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Google/Google.yaml
; ── 苹果服务 ──
ruleset=苹果服务,https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Apple.list
; === 第 5 优先级：中国大陆直连 ===
; ChinaMax_Classical.yaml 已覆盖：
; 国内域名、GEOIP,CN、常见 CDN/云服务
ruleset=全球直连,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml
; === 第 6 优先级：兜底规则 ===
ruleset=漏网之鱼,[]FINAL
;================= 策略组部分 =================
; 主策略组（默认自动选择）
custom_proxy_group=节点选择select[]香港负载[]自动选择[]故障转移[]AWS香港负载[]AWS台湾负载[]wawo[]新加坡负载[]美国负载[]AWS东京负载[]DIRECT.*
; 专用策略组
custom_proxy_group=油管视频select[]wawo[]美国负载[]AWS东京负载[]AWS香港负载[]AWS台湾负载[]节点选择[]新加坡负载[]故障转移[]DIRECT.* custom_proxy_group=香港流媒体select[]香港负载[]wawo[]AWS香港负载[]节点选择[]故障转移.*
custom_proxy_group=ChatGPTselect[]香港负载[]美国负载[]AWS东京负载[]AWS台湾负载[]新加坡负载[]节点选择[]自动选择[]故障转移[]DIRECT.* custom_proxy_group=TikTokselect[]新加坡负载[]美国负载[]AWS台湾负载[]节点选择[]AWS东京负载[]故障转移.* custom_proxy_group=奈飞视频select[]AWS东京负载[]新加坡负载[]节点选择[]美国负载[]故障转移.*
custom_proxy_group=电报消息select[]新加坡负载[]香港负载[]wawo[]AWS香港负载[]节点选择[]自动选择[]故障转移.* ; 自动测速 / 故障转移 custom_proxy_group=自动选择url-test.*https://www.cloudflare.com/cdn-cgi/trace`600,5,50
custom_proxy_group=故障转移fallback.*https://www.cloudflare.com/cdn-cgi/trace600,5,50
; 负载均衡组
custom_proxy_group=香港负载load-balance(香港电视)https://www.cloudflare.com/cdn-cgi/trace600,,50
custom_proxy_group=wawoload-balance(wawo)https://www.cloudflare.com/cdn-cgi/trace600,,50
custom_proxy_group=新加坡负载load-balance(新加坡)https://www.cloudflare.com/cdn-cgi/trace600,,50
custom_proxy_group=AWS香港负载load-balance(aws香港hy2)https://www.cloudflare.com/cdn-cgi/trace600,,50
custom_proxy_group=AWS台湾负载load-balance(台湾)https://www.cloudflare.com/cdn-cgi/trace600,,50
custom_proxy_group=AWS东京负载load-balance(东京)https://www.cloudflare.com/cdn-cgi/trace600,,50
custom_proxy_group=美国负载load-balance(洛杉矶)https://www.cloudflare.com/cdn-cgi/trace600,,50
; 其他组
custom_proxy_group=苹果服务select[]DIRECT[]节点选择[]自动选择
custom_proxy_group=广告拦截select[]REJECT[]DIRECT custom_proxy_group=全球直连select[]DIRECT[]节点选择
; 漏网之鱼
custom_proxy_group=漏网之鱼select[]节点选择[]自动选择[]DIRECT[]故障转移[]AWS香港负载[]AWS台湾负载[]wawo[]新加坡负载[]香港负载[]美国负载.*
;================= 规则生成器设置 =================
enable_rule_generator=true
overwrite_original_rules=true
