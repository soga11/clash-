custom_proxy_group=广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=全球直连`select`[]DIRECT`[]节点选择
; 漏网之鱼（方案一：默认走节点选择）
custom_proxy_group=漏网之鱼`select`[]节点选择`[]自动选择`[]DIRECT`[]故障转移`[]AWS香港负载`[]AWS台湾负载`[]wawo`[]新加坡负载`[]香港负载`[]美国负载`.*

