;================= 规则部分（精简 + IPv6 支持）=================

; === 第 0 优先级：本地网络直连 ===
; LocalAreaNetwork.list 已包含：
; 192.168/10.0/172.16 + fc00::/fe80:: 等
ruleset=全球直连,https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list

; === 第 1 优先级：DNS 分流 ===
