;===============================================================
; ACL4SSR + B7(Blackmatrix7) - 旁路由稳定版 (Fix iOS测速/1.1.1.1)
; 核心修复：
; 1) FINAL/漏网之鱼 默认走 节点选择（不再默认DIRECT）
; 2) 公共DNS IP 强制走代理（避免 1.1.1.1:443 直连超时）
; 3) Speedtest/Fast/Cloudflare测速域名走代理（iOS测速更稳）
;===============================================================

;================= 规则部分 =================

; === 第 0 优先级：先修复测速/公共DNS（必须放最前）===
ruleset=节点选择,[]IP-CIDR,1.1.1.1/32,no-resolve
ruleset=节点选择,[]IP-CIDR,1.0.0.1/32,no-resolve
ruleset=节点选择,[]IP-CIDR,8.8.8.8/32,no-resolve
ruleset=节点选择,[]IP-CIDR,8.8.4.4/32,no-resolve
ruleset=节点选择,[]IP-CIDR,9.9.9.9/32,no-resolve

ruleset=节点选择,[]DOMAIN-SUFFIX,speedtest.net
ruleset=节点选择,[]DOMAIN-SUFFIX,ookla.com
ruleset=节点选择,[]DOMAIN-SUFFIX,fast.com
ruleset=节点选择,[]DOMAIN,speed.cloudflare.com
ruleset=节点选择,[]DOMAIN-KEYWORD,speedtest

; （建议）DoH 域名补刀
ruleset=节点选择,[]DOMAIN,cloudflare-dns.com
ruleset=节点选择,[]DOMAIN,dns.google
ruleset=节点选择,[]DOMAIN,dns.quad9.net


; === 第 0.5 优先级：DNS 直连（你原来的）===
ruleset=全球直连,https://cdn.jsdelivr.net/gh/soga11/clash-@main/DNS-Direct.list


