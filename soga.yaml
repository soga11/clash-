    type: select
    proxies:
      - 自动选择
      <%regionGroupNames%>

  - name: 自动选择
    type: url-test
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    proxies:
      <%regionGroupNames%>

rules:
  <%rules%>