port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info

proxies:
  <%proxies%>

proxy-groups:
  # 🌍 主入口
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - 故障转移
      - 香港节点
      - 日本节点
      - 美国节点
      - 新加坡节点
      - 台湾节点
      - DIRECT

  # ⚡ 自动测速
  - name: 自动选择
    type: url-test
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    tolerance: 50
    proxies:
      <%regionGroupNames%>

  # 🛑 故障转移
  - name: 故障转移
    type: fallback
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    proxies:
      <%regionGroupNames%>

  # 🌏 地区分组（自动匹配）
  - name: 香港节点
    type: select
    proxies:
      - 香港

  - name: 日本节点
    type: select
    proxies:
      - 日本

  - name: 美国节点
    type: select
    proxies:
      - 美国

  - name: 新加坡节点
    type: select
    proxies:
      - 新加坡

  - name: 台湾节点
    type: select
    proxies:
      - 台湾

  # 🤖 AI / ChatGPT
  - name: AI服务
    type: select
    proxies:
      - 美国节点
      - 日本节点
      - 新加坡节点
      - 节点选择
      - DIRECT

  # 🎬 流媒体
  - name: 奈飞
    type: select
    proxies:
      - 美国节点
      - 日本节点
      - 新加坡节点
      - 节点选择

  - name: TikTok
    type: select
    proxies:
      - 日本节点
      - 新加坡节点
      - 美国节点
      - 节点选择

  - name: YouTube
    type: select
    proxies:
      - 日本节点
      - 美国节点
      - 节点选择

  # 📱 常用服务
  - name: Telegram
    type: select
    proxies:
      - 新加坡节点
      - 节点选择

  - name: 苹果服务
    type: select
    proxies:
      - DIRECT
      - 节点选择

  # 🚫 广告
  - name: 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  # 🐟 漏网
  - name: 漏网之鱼
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - DIRECT

rules:
  # AI
  - DOMAIN-SUFFIX,openai.com,AI服务
  - DOMAIN-SUFFIX,chatgpt.com,AI服务
  - DOMAIN-SUFFIX,anthropic.com,AI服务
  - DOMAIN-SUFFIX,googleapis.com,AI服务

  # 流媒体
  - DOMAIN-SUFFIX,netflix.com,奈飞
  - DOMAIN-SUFFIX,nflxvideo.net,奈飞
  - DOMAIN-SUFFIX,tiktok.com,TikTok
  - DOMAIN-SUFFIX,youtube.com,YouTube

  # 通信
  - DOMAIN-SUFFIX,telegram.org,Telegram

  # 广告
  - DOMAIN-KEYWORD,ad,广告拦截

  # 国内直连
  - GEOIP,CN,DIRECT

  # 其他走代理
  - MATCH,漏网之鱼
