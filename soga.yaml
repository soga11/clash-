port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info

# ================= 节点注入（必须） =================
proxies:
  <%proxies%>

# ================= 策略组 =================
proxy-groups:

  # 主入口
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - 故障转移
      - 香港负载
      - AWS香港负载
      - AWS台湾负载
      - AWS东京负载
      - 新加坡负载
      - 美国负载
      - wawo香港
      - DIRECT

  # 自动测速
  - name: 自动选择
    type: url-test
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    proxies:
      <%regionGroupNames%>

  # 故障转移
  - name: 故障转移
    type: fallback
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    proxies:
      <%regionGroupNames%>

  # ================= 负载均衡 =================

  - name: 香港负载
    type: load-balance
    strategy: consistent-hashing
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "香港"

  - name: AWS香港负载
    type: load-balance
    strategy: consistent-hashing
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "aws.*香港|香港.*aws"

  - name: AWS台湾负载
    type: load-balance
    strategy: consistent-hashing
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "台湾"

  - name: AWS东京负载
    type: load-balance
    strategy: consistent-hashing
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "东京"

  - name: 新加坡负载
    type: load-balance
    strategy: consistent-hashing
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "新加坡"

  - name: 美国负载
    type: load-balance
    strategy: consistent-hashing
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "美国|洛杉矶"

  - name: wawo香港
    type: load-balance
    strategy: consistent-hashing
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "wawo"

  # ================= 应用分流 =================

  - name: ChatGPT
    type: select
    proxies:
      - 美国负载
      - 新加坡负载
      - 自动选择
      - 节点选择

  - name: 奈飞
    type: select
    proxies:
      - 美国负载
      - 日本节点
      - 自动选择

  - name: TikTok
    type: select
    proxies:
      - 新加坡负载
      - 日本节点
      - 美国负载

  - name: YouTube
    type: select
    proxies:
      - 日本节点
      - 美国负载
      - 自动选择

  - name: Telegram
    type: select
    proxies:
      - 新加坡负载
      - 自动选择

  # ================= 兜底 =================

  - name: 漏网之鱼
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - DIRECT

# ================= 规则 =================
rules:
  <%rules%>
