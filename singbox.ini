;==================================================
; MiSub - sing-box 后端稳定版（你的终极适配版）
;==================================================

; ===== 核心规则 =====

; DNS / 测速优先
ruleset=节点选择,[]IP-CIDR,1.1.1.1/32
ruleset=节点选择,[]IP-CIDR,1.0.0.1/32
ruleset=节点选择,[]IP-CIDR,8.8.8.8/32
ruleset=节点选择,[]IP-CIDR,8.8.4.4/32

ruleset=节点选择,[]DOMAIN-SUFFIX,speedtest.net
ruleset=节点选择,[]DOMAIN-SUFFIX,fast.com
ruleset=节点选择,[]DOMAIN,speed.cloudflare.com

ruleset=节点选择,[]DOMAIN,cloudflare-dns.com
ruleset=节点选择,[]DOMAIN,dns.google


; ===== AI =====
ruleset=ChatGPT,[]DOMAIN-SUFFIX,openai.com
ruleset=ChatGPT,[]DOMAIN-SUFFIX,chatgpt.com
ruleset=ChatGPT,[]DOMAIN-SUFFIX,claude.ai
ruleset=ChatGPT,[]DOMAIN-SUFFIX,anthropic.com
ruleset=ChatGPT,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@release/rule/Clash/OpenAI/OpenAI.yaml


; ===== TikTok =====
ruleset=TikTok,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@release/rule/Clash/TikTok/TikTok.yaml


; ===== YouTube =====
ruleset=油管视频,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@release/rule/Clash/YouTube/YouTube.yaml


; ===== Netflix =====
ruleset=奈飞视频,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@release/rule/Clash/Netflix/Netflix.yaml


; ===== Telegram =====
ruleset=电报消息,[]IP-CIDR,91.108.0.0/16
ruleset=电报消息,[]IP-CIDR,149.154.0.0/16


; ===== Apple =====
ruleset=苹果服务,https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Apple.list


; ===== 广告 =====
ruleset=广告拦截,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@release/rule/Clash/Advertising/Advertising.yaml


; ===== 国内 =====
ruleset=全球直连,[]GEOIP,CN


; ===== FINAL =====
ruleset=漏网之鱼,[]FINAL


;================= 策略组 =================

custom_proxy_group=节点选择`select`[]自动选择`[]故障转移`[]DIRECT`.*

custom_proxy_group=ChatGPT`select`[]自动选择`[]节点选择`[]DIRECT`.*
custom_proxy_group=TikTok`select`[]自动选择`[]节点选择`.*
custom_proxy_group=油管视频`select`[]自动选择`[]节点选择`.*
custom_proxy_group=奈飞视频`select`[]自动选择`[]节点选择`.*
custom_proxy_group=电报消息`select`[]自动选择`[]节点选择`.*

custom_proxy_group=自动选择`url-test`.*`https://www.cloudflare.com/cdn-cgi/trace`600,5,50
custom_proxy_group=故障转移`fallback`.*`https://www.cloudflare.com/cdn-cgi/trace`600,5,50

custom_proxy_group=苹果服务`select`[]DIRECT`[]节点选择
custom_proxy_group=广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=全球直连`select`[]DIRECT`[]节点选择

custom_proxy_group=漏网之鱼`select`[]节点选择`[]DIRECT`.*

enable_rule_generator=true
overwrite_original_rules=true
