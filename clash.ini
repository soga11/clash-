# ================== OpenClash 完整修复配置 ==================
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
ipv6: true
external-controller: 127.0.0.1:9090

# GeoData 设置（解决下载问题）
geodata-mode: true
geo-site-url: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
geo-ip-url: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"

# ================== Rule Providers ==================
rule-providers:
  adrules:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Cats-Team/AdRules@main/adrules_domainset.txt"
    path: ./rules/adrules.txt
    interval: 86400

  advertising:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Advertising/Advertising_Domain.yaml"
    path: ./rules/advertising.yaml
    interval: 86400

  apple:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Apple.list"
    path: ./rules/apple.txt
    interval: 86400

  china:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml"
    path: ./rules/china.yaml
    interval: 86400

  google:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Google/Google.yaml"
    path: ./rules/google.yaml
    interval: 86400

# ================== 规则部分 ==================
rules:
  # 第 0 优先级：本地网络直连
  - RULE-SET,LocalAreaNetwork,全球直连

  # 第 1 优先级：DNS 分流
  - DOMAIN-SUFFIX,dns.pub,全球直连
  - DOMAIN-SUFFIX,doh.pub,全球直连
  - DOMAIN-SUFFIX,alidns.com,全球直连
  - IP-CIDR,114.114.114.114/32,全球直连,no-resolve
  - IP-CIDR,223.5.5.5/32,全球直连,no-resolve
  - IP-CIDR,119.29.29.29/32,全球直连,no-resolve
  - IP-CIDR,180.76.76.76/32,全球直连,no-resolve

  - DOMAIN-SUFFIX,cloudflare-dns.com,节点选择
  - DOMAIN-SUFFIX,dns.google,节点选择
  - DOMAIN-SUFFIX,quad9.net,节点选择
  - IP-CIDR,1.1.1.1/32,节点选择,no-resolve
  - IP-CIDR,1.0.0.1/32,节点选择,no-resolve
  - IP-CIDR,8.8.8.8/32,节点选择,no-resolve
  - IP-CIDR,8.8.4.4/32,节点选择,no-resolve
  - IP-CIDR6,2606:4700:4700::1111/128,节点选择,no-resolve
  - IP-CIDR6,2606:4700:4700::1001/128,节点选择,no-resolve
  - IP-CIDR6,2001:4860:4860::8888/128,节点选择,no-resolve
  - IP-CIDR6,2001:4860:4860::8844/128,节点选择,no-resolve

  # 第 2 优先级：测速域名
  - DOMAIN-SUFFIX,speedtest.net,节点选择
  - DOMAIN,fast.com,节点选择
  - DOMAIN-KEYWORD,speedtest,节点选择

  # 第 3 优先级：广告拦截
  - RULE-SET,adrules,广告拦截
  - RULE-SET,advertising,广告拦截
  - GEOSITE,category-ads-all,广告拦截

  # 第 4 优先级：应用规则
  - DOMAIN-SUFFIX,openai.com,ChatGPT
  - DOMAIN-SUFFIX,chatgpt.com,ChatGPT
  - DOMAIN-SUFFIX,oaistatic.com,ChatGPT
  - DOMAIN-SUFFIX,oaiusercontent.com,ChatGPT
  - DOMAIN-SUFFIX,openaiapi-site.azureedge.net,ChatGPT
  - DOMAIN-KEYWORD,openai,ChatGPT
  - DOMAIN-SUFFIX,claude.ai,ChatGPT
  - DOMAIN-SUFFIX,anthropic.com,ChatGPT
  - DOMAIN,gemini.google.com,ChatGPT
  - DOMAIN-SUFFIX,generativelanguage.googleapis.com,ChatGPT
  - DOMAIN-SUFFIX,ai.google.dev,ChatGPT
  - DOMAIN-SUFFIX,aistudio.google.com,ChatGPT
  - DOMAIN-SUFFIX,perplexity.ai,ChatGPT
  - DOMAIN-SUFFIX,copilot.microsoft.com,ChatGPT
  - DOMAIN-SUFFIX,bing.com,ChatGPT
  - RULE-SET,TikTok,TikTok
  - RULE-SET,YouTube,油管视频
  - RULE-SET,Netflix,奈飞视频
  - RULE-SET,google,节点选择
  - RULE-SET,apple,苹果服务
  - RULE-SET,Telegram,电报消息

  # 第 5 优先级：中国大陆直连
  - RULE-SET,china,全球直连

  # 第 6 优先级：兜底
  - MATCH,漏网之鱼

# ================== 策略组部分（完全保留你原来的）=================
custom_proxy_group=节点选择`select`[]香港负载`[]自动选择`[]故障转移`[]AWS香港负载`[]AWS台湾负载`[]wawo`[]新加坡负载`[]美国负载`[]AWS东京负载`[]DIRECT`.*
custom_proxy_group=油管视频`select`[]wawo`[]美国负载`[]AWS东京负载`[]AWS香港负载`[]AWS台湾负载`[]节点选择`[]新加坡负载`[]故障转移`[]DIRECT`.*
custom_proxy_group=香港流媒体`select`[]香港负载`[]wawo`[]AWS香港负载`[]节点选择`[]故障转移`.*
custom_proxy_group=ChatGPT`select`[]香港负载`[]美国负载`[]AWS东京负载`[]AWS台湾负载`[]新加坡负载`[]节点选择`[]自动选择`[]故障转移`[]DIRECT`.*
custom_proxy_group=TikTok`select`[]新加坡负载`[]美国负载`[]AWS台湾负载`[]节点选择`[]AWS东京负载`[]故障转移`.*
custom_proxy_group=奈飞视频`select`[]AWS东京负载`[]新加坡负载`[]节点选择`[]美国负载`[]故障转移`.*
custom_proxy_group=电报消息`select`[]新加坡负载`[]香港负载`[]wawo`[]AWS香港负载`[]节点选择`[]自动选择`[]故障转移`.*
custom_proxy_group=自动选择`url-test`.*`https://www.cloudflare.com/cdn-cgi/trace`600,5,50
custom_proxy_group=故障转移`fallback`.*`https://www.cloudflare.com/cdn-cgi/trace`600,5,50
custom_proxy_group=香港负载`load-balance`(香港电视)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=wawo`load-balance`(wawo)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=新加坡负载`load-balance`(新加坡)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=AWS香港负载`load-balance`(aws香港hy2)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=AWS台湾负载`load-balance`(台湾)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=AWS东京负载`load-balance`(东京)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=美国负载`load-balance`(洛杉矶)`https://www.cloudflare.com/cdn-cgi/trace`600,,50
custom_proxy_group=苹果服务`select`[]DIRECT`[]节点选择`[]自动选择
custom_proxy_group=广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=全球直连`select`[]DIRECT`[]节点选择
custom_proxy_group=漏网之鱼`select`[]节点选择`[]自动选择`[]DIRECT`[]故障转移`[]AWS香港负载`[]AWS台湾负载`[]wawo`[]新加坡负载`[]香港负载`[]美国负载`.*

;================= 规则生成器设置 =================
enable_rule_generator=true
overwrite_original_rules=true
