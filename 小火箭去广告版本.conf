[Host]
# 苹果服务使用系统 DNS，防止 iCloud / 推送异常
*.apple.com = server:system
*.icloud.com = server:system
*.push.apple.com = server:system
localhost = 127.0.0.1


[URL Rewrite]
# Google 防跳转
^https?://(www\.)?g\.cn https://www.google.com 302
^https?://(www\.)?google\.cn https://www.google.com 302


[MITM]
# 不建议为了去广告全量 MITM，域名广告由 Rule 的 REJECT 处理
hostname = *.google.cn
