[Host]
# 苹果服务使用系统 DNS，防止 iCloud/推送异常
*.apple.com = server:system
*.icloud.com = server:system
*.push.apple.com = server:system
localhost = 127.0.0.1


[URL Rewrite]
# Google 防跳转（cn 域名重定向）
^https?://(www\.)?g\.cn https://www.google.com 302
^https?://(www\.)?google\.cn https://www.google.com 302


[MITM]
# ⚠️ 去广告需配合：配置 > ⓘ > HTTPS 解密 > 生成并安装证书 > 系统设置中信任证书
# 仅拦截常见广告/统计域名，避免全量 MITM 导致耗电/卡顿
hostname = *.google.cn, *.ad.*.com, *.ads.*.com, *.tracking.*.com, *.analytics.*.com, *.doubleclick.net, *.googlesyndication.com
