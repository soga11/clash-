# =============================================
# MiSub 最终可用模板 - 已彻底修正
# 为 soga11 定制 | 2026-04-13
# =============================================

port: 7890
socks-port: 7891
mixed-port: 7893
ipv6: true
mode: rule
log-level: info
allow-lan: true
unified-delay: true
tcp-concurrent: true

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: true
  default-nameserver:
    - 223.5.5.5
    - 8.8.8.8
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

proxies: []

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - 故障转移
      - 香港负载
      - AWS香港负载
      - wawo香港
      - 新加坡负载
      - 美国负载
      - AWS东京负载
      - AWS台湾负载
      - DIRECT

  - name: 自动选择
    type: url-test
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    tolerance: 50
    proxies: []

  - name: 故障转移
    type: fallback
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []

  - name: 香港负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "(香港|Hong Kong|HK|wawo香港)"

  - name: AWS香港负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "aws香港"

  - name: wawo香港
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "wawo香港"

  - name: 新加坡负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "新加坡"

  - name: 美国负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "洛杉矶|美国|US"

  - name: AWS东京负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "东京"

  - name: AWS台湾负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "台湾"

  - name: 全球直连
    type: select
    proxies:
      - DIRECT
      - 节点选择

  - name: 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 节点选择

  - name: ChatGPT
    type: select
    proxies:
      - 香港负载
      - 美国负载
      - AWS东京负载
      - AWS台湾负载
      - 新加坡负载
      - 节点选择
      - 自动选择
      - 故障转移
      - DIRECT

  - name: TikTok
    type: select
    proxies:
      - AWS东京负载
      - 新加坡负载
      - 美国负载
      - AWS台湾负载
      - 节点选择
      - 自动选择
      - 故障转移

  - name: 奈飞视频
    type: select
    proxies:
      - 美国负载
      - AWS东京负载
      - 新加坡负载
      - 节点选择
      - 自动选择
      - 故障转移

  - name: 油管视频
    type: select
    proxies:
      - wawo香港
      - 美国负载
      - AWS东京负载
      - AWS香港负载
      - 节点选择
      - 自动选择
      - 故障转移
      - DIRECT

  - name: 电报消息
    type: select
    proxies:
      - 新加坡负载
      - 节点选择
      - 自动选择
      - 故障转移

  - name: 香港流媒体
    type: select
    proxies:
      - 香港负载
      - wawo香港
      - AWS香港负载
      - 节点选择
      - 故障转移

  - name: 苹果服务
    type: select
    proxies:
      - DIRECT
      - 节点选择
      - 自动选择

  - name: 网盘下载
    type: select
    proxies:
      - 全球直连
      - 节点选择

  - name: 漏网之鱼
    type: select
    proxies:
      - DIRECT
      - 节点选择
      - AWS香港负载
      - AWS台湾负载
      - wawo香港
      - 新加坡负载
      - 香港负载
      - 美国负载
      - 自动选择
      - 故障转移

rules:
  - RULE-SET,节点选择,节点选择
  - RULE-SET,全球直连,全球直连
  - RULE-SET,广告拦截,广告拦截
  - RULE-SET,ChatGPT,ChatGPT
  - RULE-SET,TikTok,TikTok
  - RULE-SET,油管视频,油管视频
  - RULE-SET,奈飞视频,奈飞视频
  - RULE-SET,香港流媒体,香港流媒体
  - RULE-SET,电报消息,电报消息
  - RULE-SET,苹果服务,苹果服务
  - RULE-SET,网盘下载,网盘下载
  - RULE-SET,漏网之鱼,漏网之鱼
  - GEOIP,CN,全球直连
  - MATCH,漏网之鱼

