proxies:
<%proxies%>

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - 香港节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - DIRECT

  - name: 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: <%interval%>
    proxies:
      - 香港节点
      - 新加坡节点
      - 日本节点
      - 美国节点

  - name: 香港节点
    type: select
    proxies:
      - HK
      - Hong Kong

  - name: 新加坡节点
    type: select
    proxies:
      - SG
      - Singapore

  - name: 日本节点
    type: select
    proxies:
      - JP
      - Japan

  - name: 美国节点
    type: select
    proxies:
      - US
      - United States

rules:
  # ===== DNS & 测速强制走代理 =====
  - IP-CIDR,1.1.1.1/32,节点选择,no-resolve
  - IP-CIDR,8.8.8.8/32,节点选择,no-resolve
  - DOMAIN-SUFFIX,speedtest.net,节点选择
  - DOMAIN-SUFFIX,fast.com,节点选择

  # ===== AI =====
  - DOMAIN-SUFFIX,openai.com,节点选择
  - DOMAIN-SUFFIX,claude.ai,节点选择
  - DOMAIN-KEYWORD,chatgpt,节点选择

  # ===== 流媒体 =====
  - DOMAIN-SUFFIX,netflix.com,节点选择
  - DOMAIN-SUFFIX,youtube.com,节点选择
  - DOMAIN-SUFFIX,tiktok.com,节点选择

  # ===== Telegram =====
  - IP-CIDR,91.108.0.0/16,节点选择,no-resolve
  - IP-CIDR,149.154.0.0/16,节点选择,no-resolve

  # ===== 国内直连 =====
  - GEOIP,CN,DIRECT

  # ===== 最终规则 =====
  - MATCH,节点选择
