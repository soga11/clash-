proxies:
<%proxies%>

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - 新加坡负载
      - 香港负载
      - wawo香港
      - 美国负载
      - DIRECT

  - name: 自动选择
    type: url-test
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    tolerance: 50
    proxies: []

  - name: 新加坡负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "新加坡|光帆新加坡|alt新加坡|0alt新加坡"

  - name: 香港负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "香港|HK|香港电视|wawo香港|disxcloud香港|733.*香港|alt.香港"

  - name: wawo香港
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "wawo香港"

  - name: 美国负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "美国|洛杉矶"

  - name: ChatGPT
    type: select
    proxies:
      - 新加坡负载
      - 香港负载
      - 美国负载
      - 节点选择
      - DIRECT

  - name: 油管视频
    type: select
    proxies:
      - wawo香港
      - 香港负载
      - 新加坡负载
      - 节点选择
      - DIRECT

rules:
<%rules%>
