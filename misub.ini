# MiSub 修复精简版 - 解决 loop + 无分组问题
# 专为你的节点优化 | 2026-04-13

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: ":9090"
ipv6: true

dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
    - 223.5.5.5
    - 1.1.1.1
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

proxies: []

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - 新加坡负载
      - 香港负载
      - wawo香港
      - 美国负载
      - DIRECT

  - name: 自动选择
    type: url-test
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    tolerance: 50
    proxies: []

  - name: 新加坡负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "新加坡|光帆新加坡|alt新加坡|0alt新加坡"

  - name: 香港负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "香港|HK|香港电视|wawo香港|disxcloud香港|733.*香港|alt.香港"

  - name: wawo香港
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "wawo香港"

  - name: 美国负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "美国|洛杉矶"

  - name: ChatGPT
    type: select
    proxies:
      - 新加坡负载
      - 香港负载
      - 美国负载
      - 节点选择
      - DIRECT

  - name: 油管视频
    type: select
    proxies:
      - wawo香港
      - 香港负载
      - 新加坡负载
      - 节点选择
      - DIRECT

  - name: 漏网之鱼
    type: select
    proxies:
      - DIRECT
      - 节点选择
      - 新加坡负载

rules:
  - RULE-SET,节点选择,节点选择
  - RULE-SET,ChatGPT,ChatGPT
  - RULE-SET,油管视频,油管视频
  - GEOIP,CN,DIRECT
  - MATCH,漏网之鱼
