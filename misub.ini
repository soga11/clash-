proxies:
  <%proxies%>

proxy-groups:
  # 主策略组
  - name: 节点选择
    type: select
    proxies:
      - 香港负载
      - 故障转移
      - AWS香港负载
      - AWS台湾负载
      - wawo香港
      - 新加坡负载
      - 自动选择
      - 美国负载
      - AWS东京负载
      - DIRECT

  # 专用策略组
  - name: 油管视频
    type: select
    proxies:
      - wawo香港
      - 美国负载
      - AWS东京负载
      - AWS香港负载
      - AWS台湾负载
      - 节点选择
      - 自动选择
      - 故障转移
      - DIRECT

  - name: 香港流媒体
    type: select
    proxies:
      - 香港负载
      - wawo香港
      - AWS香港负载
      - 节点选择
      - 故障转移

  - name: ChatGPT
    type: select
    proxies:
      - 香港负载
      - 美国负载
      - AWS东京负载
      - AWS台湾负载
      - 新加坡负载
      - 节点选择
      - 自动选择
      - 故障转移
      - DIRECT

  - name: TikTok
    type: select
    proxies:
      - AWS东京负载
      - 新加坡负载
      - 美国负载
      - AWS台湾负载
      - 节点选择
      - 自动选择
      - 故障转移

  - name: 奈飞视频
    type: select
    proxies:
      - 美国负载
      - AWS东京负载
      - 新加坡负载
      - 节点选择
      - 自动选择
      - 故障转移

  - name: 电报消息
    type: select
    proxies:
      - 新加坡负载
      - 节点选择
      - 自动选择
      - 故障转移

  # 自动测速 / 故障转移
  - name: 自动选择
    type: url-test
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    proxies:
      <%regionGroupNames%>

  - name: 故障转移
    type: fallback
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    proxies:
      <%regionGroupNames%>

  # 负载均衡（用关键词匹配）
  - name: 美国负载
    type: load-balance
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "洛杉矶"

  - name: 新加坡负载
    type: load-balance
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "新加坡"

  - name: 香港负载
    type: load-balance
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "香港"

  - name: AWS香港负载
    type: load-balance
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "aws香港hy2"

  - name: AWS台湾负载
    type: load-balance
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "台湾"

  - name: AWS东京负载
    type: load-balance
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "东京"

  - name: wawo香港
    type: load-balance
    url: http://www.cloudflare.com/cdn-cgi/trace
    interval: <%interval%>
    filter: "wawo香港"

  # 其他
  - name: 苹果服务
    type: select
    proxies:
      - DIRECT
      - 节点选择
      - 自动选择

  - name: 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 全球直连
    type: select
    proxies:
      - DIRECT
      - 节点选择

  - name: 漏网之鱼
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - 故障转移
      - DIRECT

rules:
  <%rules%>
