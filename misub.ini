# MiSub CDN 版最终模板 - 推荐直接使用
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: ":9090"

proxies: []

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - 故障转移
      - 香港负载
      - AWS香港负载
      - wawo香港
      - 新加坡负载
      - 美国负载
      - AWS东京负载
      - AWS台湾负载
      - DIRECT

  - name: 自动选择
    type: url-test
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    tolerance: 50
    proxies: []

  - name: 故障转移
    type: fallback
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []

  - name: 香港负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "(香港|Hong Kong|HK|wawo香港|光帆.*香港|733.*香港|disxcloud香港)"

  - name: 新加坡负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "新加坡|光帆新加坡|alt新加坡"

  - name: 美国负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "美国|洛杉矶|aws.*洛杉矶"

  - name: AWS东京负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "东京|aws东京"

  - name: AWS台湾负载
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "台湾|aws台湾"

  - name: wawo香港
    type: load-balance
    strategy: consistent-hashing
    url: https://www.cloudflare.com/cdn-cgi/trace
    interval: 600
    proxies: []
    filter: "wawo香港"

  # 其他组（ChatGPT、油管视频、奈飞等）保持你之前的配置，这里省略以节省空间，你可以继续添加
  - name: ChatGPT
    type: select
    proxies:
      - 新加坡负载
      - 香港负载
      - 美国负载
      - 节点选择
      - DIRECT

  - name: 油管视频
    type: select
    proxies:
      - wawo香港
      - 香港负载
      - 新加坡负载
      - 节点选择

  - name: 漏网之鱼
    type: select
    proxies:
      - DIRECT
      - 节点选择
      - 新加坡负载

  # ... 其余组按需添加

rules:
  - RULE-SET,节点选择,节点选择
  - RULE-SET,全球直连,全球直连
  - RULE-SET,广告拦截,广告拦截
  - RULE-SET,ChatGPT,ChatGPT
  - RULE-SET,油管视频,油管视频
  - RULE-SET,奈飞视频,奈飞视频
  - RULE-SET,漏网之鱼,漏网之鱼
  - GEOIP,CN,全球直连
  - MATCH,漏网之鱼

rule-providers:
  # 所有 rule-providers 都改成 CDN 版
  节点选择:
    type: http
    behavior: classical
    url: https://cdn.jsdelivr.net/gh/soga11/clash-@main/rly.ini
    path: ./ruleset/rly.ini
    interval: 3600   # 改小一点方便测试
  # 其他 rule-providers（全球直连、广告拦截、ChatGPT 等）同理，全部改成上面这个 CDN url
