RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/myTVSUPER/myTVSUPER.list,香港流媒体


# ===== Telegram (含IPv6) =====
IP-CIDR,91.108.0.0/16,电报消息,no-resolve
IP-CIDR,149.154.0.0/16,电报消息,no-resolve

IP-CIDR6,2001:b28:f23d::/48,电报消息,no-resolve
IP-CIDR6,2001:b28:f23f::/48,电报消息,no-resolve

RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/Telegram/Telegram.list,电报消息


# ===== Apple =====
