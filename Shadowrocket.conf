[Host]
# 苹果服务使用系统 DNS 解析，防止 iCloud 问题
*.apple.com = server:system
*.icloud.com = server:system
localhost = 127.0.0.1


[URL Rewrite]
# Google 防跳转（cn 域名重定向到 google.com）
^https?://(www.)?g.cn https://www.google.com 302
^https?://(www.)?google.cn https://www.google.com 302


[MITM]
# 如需开启 HTTPS 解密（去广告脚本需要），在此填写 hostname
# 开启方法：配置 > ⓘ > HTTPS 解密 > 生成证书 > 安装 > 信任证书
hostname = *.google.cn
