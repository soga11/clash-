RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list,全球直连
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list,全球直连

; 夸克 & 国内网盘（提前）
DOMAIN-SUFFIX,quark.cn,全球直连
DOMAIN-SUFFIX,myquark.cn,全球直连
DOMAIN-SUFFIX,quark.sm.cn,全球直连
DOMAIN-SUFFIX,quark.com,全球直连
DOMAIN-SUFFIX,quarkclouddrive.com,全球直连
DOMAIN-SUFFIX,uc.cn,全球直连
DOMAIN-SUFFIX,alicdn.com,全球直连
DOMAIN-SUFFIX,aliyundrive.com,全球直连
DOMAIN-SUFFIX,alipan.com,全球直连
DOMAIN-SUFFIX,baidupcs.com,全球直连
DOMAIN-KEYWORD,quark,全球直连
DOMAIN-KEYWORD,aliyundrive,全球直连

; 广告拦截（精简，只核心）
RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/Advertising/Advertising.list,广告拦截
RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/Hijacking/Hijacking.list,广告拦截  ; Privacy 合并进 Hijacking 减少开销

; 专用应用（blackmatrix7 补充，规则库今日更新活跃）
; ChatGPT
DOMAIN-SUFFIX,openai.com,ChatGPT
DOMAIN-SUFFIX,chatgpt.com,ChatGPT
DOMAIN-SUFFIX,claude.ai,ChatGPT
DOMAIN-SUFFIX,anthropic.com,ChatGPT
RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/OpenAI/OpenAI.list,ChatGPT

; TikTok / YouTube / Netflix / 香港流媒体 / Telegram（同上，省略重复手动域）
RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/TikTok/TikTok.list,TikTok
RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/YouTube/YouTube.list,油管视频
RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/Netflix/Netflix.list,奈飞视频
RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/myTVSUPER/myTVSUPER.list,香港流媒体
RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/Telegram/Telegram.list,电报消息

; 苹果服务
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list,苹果服务

; GFW
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list,节点选择

; 中国直连（精简：用 blackmatrix7 ChinaTest 替换部分 ACL4SSR，覆盖更全）
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/ChinaTest/ChinaTest_Domain.list,全球直连
RULE-SET,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt,全球直连,no-resolve
GEOIP,CN,全球直连,no-resolve

; 兜底
FINAL,漏网之鱼

[Host]
localhost = 127.0.0.1

[URL Rewrite]
^https?://(www.)?g.cn https://www.google.com 302
^https?://(www.)?google.cn https://www.google.com 302
