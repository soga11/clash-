RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@release/rule/Shadowrocket/YouTube/YouTube.list,油管视频
RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@release/rule/Shadowrocket/Netflix/Netflix.list,奈飞视频
RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@release/rule/Shadowrocket/myTVSUPER/myTVSUPER.list,香港流媒体


